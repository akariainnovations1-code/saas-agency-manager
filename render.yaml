services:
  # 1. Express Backend Web Service
  - type: web
    name: saas-agency-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_DIALECT
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: saas-agency-db
          property: connectionString

  # 2. Vite Frontend Static Site
  - type: web
    name: saas-agency-frontend
    env: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: saas-agency-backend
          property: host

databases:
  # 3. PostgreSQL Database
  - name: saas-agency-db
    plan: free
    databaseName: saas_agency_db
    user: saas_admin
